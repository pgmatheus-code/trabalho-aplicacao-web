<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=0.8">
        <title>Contato</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <!-- menu fixo no topo -->
        <br>
        <nav>
            <table class="centered">
                <tr>
                    <td><a href="sobre.html" class="link-button" role="button">Sobre mim</a></td>
                    <td><a href="formacao.html" class="link-button" role="button">Formação</a></td>
                    <td><a href="portfolio.html" class="link-button" role="button">Portfólio</a></td>
                    <td><p class="inactive-link-button" role="button">Contato</p></td>
                </tr>
            </table>
        </nav>
        <!-- conteúdo principal -->
        <main class="container">
            <h3 class="center">Contato</h3>
            <h3 class="warning-label" id="warning-label"></h3>
            
            <!-- formulário -->
            <form method="" action="" class="form">
                <div class="row row-form">
                    <label>Nome:</label>
                    <input type="text" class="input" id="name-field" style="width: 100%;">
                </div>
                <div class="row row-form">
                    <label>E-mail:</label>
                    <input type="email" class="input" id="email-field" style="width: 100%;">
                </div>
                <div class="row row-form">
                    <label>Mensagem:</label>
                    <textarea rows="7" class="input" id="message-field"></textarea>
                </div>
                <div class="row row-form">
                    <button class="link-button"
                            type="button" id="send-button">Enviar mensagem</button>
                </div>
            </form>
        </main>        
    </body>
</html>
